<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Ulang Tahun Sayang! 🎉💕</title>
  <style>
    body {
      margin: 0; padding: 0;
      height: 100vh;
      background: linear-gradient(45deg, #ff9a9e, #fad0c4, #a1c4fd, #ff9a9e);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      font-family: 'Arial', sans-serif;
      color: white;
      overflow: hidden;
      text-align: center;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .screen {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 10;
      padding: 20px;
      box-sizing: border-box;
    }

    .active { display: flex !important; }

    input {
      padding: 18px 25px;
      font-size: 1.8rem;
      width: 320px;
      text-align: center;
      border: none;
      border-radius: 50px;
      margin: 25px 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input:focus { outline: 4px solid #ff6b6b; }

    button {
      padding: 18px 50px;
      font-size: 1.7rem;
      background: white;
      color: #ff6b6b;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      margin-top: 30px;
    }

    button:hover {
      transform: scale(1.05);
      background: #ff6b6b;
      color: white;
    }

    h1 { 
      font-size: 3.1rem; 
      margin: 15px 0 10px; 
      text-shadow: 0 0 15px rgba(0,0,0,0.4); 
    }

    .loves { 
      font-size: 5rem; 
      display: flex; 
      gap: 50px; 
      margin: 30px 0; 
      cursor: pointer; 
      user-select: none; 
    }
    .love { 
      transition: all 0.4s ease; 
    }
    .love.red { 
      color: #ff4757; 
      transform: scale(1.4); 
    }

    .bubble {
      background: rgba(255, 255, 255, 0.95);
      color: #ff4757;
      padding: 14px 22px;
      margin: 12px auto;
      max-width: 520px;
      border-radius: 22px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      position: relative;
      font-size: 1.48rem;
      line-height: 1.55;
      opacity: 0;
      transform: translateY(15px);
    }

    .bubble:after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 40px;
      border: 10px solid transparent;
      border-top-color: rgba(255, 255, 255, 0.95);
    }

    .typing {
      overflow: hidden;
      white-space: pre-wrap;
      border-right: 3px solid #ff4757;
      animation: typing-cursor 0.7s step-end infinite;
    }

    @keyframes typing-cursor {
      50% { border-color: transparent; }
    }

    .click-to-continue {
      font-size: 1.45rem;
      margin-top: 40px;
      padding: 10px 28px;
      border-radius: 30px;
      opacity: 0.9;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-block;
    }

    .click-to-continue:hover {
      opacity: 1;
      transform: scale(1.08);
      background: rgba(255,255,255,0.25);
    }

    /* Animasi hati melayang */
    .heart-float {
      position: absolute;
      font-size: 2.5rem;
      animation: floatHeart 5s linear infinite;
      z-index: 5;
      pointer-events: none;
      user-select: none;
    }

    @keyframes floatHeart {
      0% { 
        transform: translateY(120px) scale(0.4) rotate(0deg); 
        opacity: 0; 
      }
      15% { opacity: 1; }
      100% { 
        transform: translateY(-850px) scale(1.4) rotate(25deg); 
        opacity: 0; 
      }
    }

    canvas { 
      position: absolute; 
      top: 0; left: 0; 
      z-index: 1; 
      pointer-events: none; 
      display: none; /* Canvas confetti dihapus */
    }
  </style>
</head>
<body>

  <audio id="backsound" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
    Browser kamu tidak mendukung backsound.
  </audio>

  <canvas id="canvas"></canvas>

  <!-- SCREEN 1 -->
  <div class="screen active" id="screen1">
    <h1>Masukkan nama</h1>
    <input type="text" id="namaInput" autofocus placeholder="Nama">
    <button onclick="lanjutKeScreen2()">Lanjut ❤️</button>
  </div>

  <!-- SCREEN 2 -->
  <div class="screen" id="screen2">
    <h1>Hai, <span id="namaTampil"></span>! 💕</h1>
    <p style="font-size:1.6rem; margin-top:20px;">Mas ada sesuatu spesial buat adek nih...</p>
    <p style="font-size:1.3rem; margin-top:50px; opacity:0.9;">klik dimana saja ya sayang</p>
  </div>

  <!-- SCREEN 3 -->
  <div class="screen" id="screen3">
    <h1 style="font-size: 2.4rem; margin-bottom: 20px;">Klik 3 LOVE di bawah ini</h1>
    <div class="loves" id="loveContainer">
      <span class="love" data-clicked="false">🤍</span>
      <span class="love" data-clicked="false">🤍</span>
      <span class="love" data-clicked="false">🤍</span>
    </div>
    <p style="font-size:1.4rem;">Klik sampai semua jadi merah ya 💕</p>
  </div>

  <!-- SCREEN 4 -->
  <div class="screen" id="screen4">
    <h1>Hai, <span id="namaTampil2"></span>! </h1>
    
    <div id="screen4Content" style="width:90%; max-width:720px; margin-top:10px;">
      <div class="bubble" id="bubble1"></div>
      <div class="bubble" id="bubble2"></div>
      <div class="bubble" id="bubble3"></div>
      <div class="bubble" id="bubble4"></div>
      <div class="bubble" id="bubble5"></div>
    </div>

    <div id="continueText4" class="click-to-continue" style="display: none;">
      klik disini sayang ❤️
    </div>
  </div>

  <!-- SCREEN 5 -->
  <div class="screen" id="screen5">
    <h1>Hai lagi, <span id="namaTampil3"></span> 💕</h1>
    
    <div id="screen5Content" style="width:90%; max-width:680px; text-align:center; font-size:1.52rem; line-height:1.75; padding:0 20px; min-height:160px;">
      <!-- Pesan akan diketik di sini -->
    </div>

    <div id="continueText5" class="click-to-continue" style="display: none;">
      klik lagi disini ya
    </div>
  </div>

  <!-- SCREEN 6 -->
  <div class="screen" id="screen6">
    <h1 style="font-size: 2.7rem; margin-bottom: 40px;">Mau kasih pesan balik ke Mas ?</h1>
    
    <button onclick="balasWhatsApp()" style="padding: 20px 55px; font-size: 1.8rem;">
      Balas via WhatsApp 💬
    </button>
  </div>

  <script>
    // Canvas tetap ada tapi confetti dihapus (hanya untuk compatibility)
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Typewriter Effect
    function typeWriter(element, text, speed = 38, callback) {
      element.innerHTML = `<span class="typing"></span>`;
      const span = element.querySelector('.typing');
      let i = 0;
      function type() {
        if (i < text.length) {
          span.textContent += text.charAt(i);
          i++;
          setTimeout(type, speed);
        } else {
          span.style.borderRight = 'none';
          if (callback) callback();
        }
      }
      type();
    }

    function lanjutKeScreen2() {
      const nama = document.getElementById('namaInput').value.trim();
      if (nama === "") { 
        alert("Masukkan nama dulu ya 😊"); 
        return; 
      }
      document.getElementById('namaTampil').textContent = nama;
      document.getElementById('namaTampil2').textContent = nama;
      document.getElementById('namaTampil3').textContent = nama;
      
      document.getElementById('screen1').classList.remove('active');
      document.getElementById('screen2').classList.add('active');
    }

    // Screen 2 ke Screen 3
    document.getElementById('screen2').addEventListener('click', () => {
      document.getElementById('screen2').classList.remove('active');
      document.getElementById('screen3').classList.add('active');
    });

    // Animasi Love melayang (khusus Screen 3 saat klik)
    function createFloatingLove() {
      const container = document.getElementById('screen3');
      for (let i = 0; i < 12; i++) {
        setTimeout(() => {
          const heart = document.createElement('div');
          heart.className = 'heart-float';
          heart.textContent = ['❤️', '💖', '💗', '💕', '💞'][Math.floor(Math.random() * 5)];
          
          heart.style.left = Math.random() * 100 + 'vw';
          heart.style.animationDuration = (3.5 + Math.random() * 3) + 's';
          heart.style.fontSize = (2.2 + Math.random() * 1.2) + 'rem';
          
          container.appendChild(heart);
          
          // Hapus setelah animasi selesai
          setTimeout(() => heart.remove(), 8000);
        }, i * 80);
      }
    }

    // Klik Love di Screen 3
    let loveCount = 0;
    document.querySelectorAll('#loveContainer .love').forEach(love => {
      love.addEventListener('click', function() {
        if (this.getAttribute('data-clicked') === 'false') {
          this.setAttribute('data-clicked', 'true');
          this.classList.add('red');
          this.textContent = '❤️';
          loveCount++;

          // Munculkan animasi love setiap kali diklik
          createFloatingLove();

          if (loveCount === 3) {
            setTimeout(() => {
              document.getElementById('screen3').classList.remove('active');
              document.getElementById('screen4').classList.add('active');
              startTypingSequenceScreen4();
            }, 800);
          }
        }
      });
    });

    function startTypingSequenceScreen4() {
      const texts = [
        "Barakallahu fii umrik, sayangku 💕",
        "SELAMAT ULANG TAHUN SAYANG",
        "Semoga Mas selalu bisa jadi alasan senyummu",
        "Semoga Allah berikan kesehatan, rezeki melimpah",
        "dan kebahagiaan yang tiada akhir. Aamiin"
      ];
      const bubbles = [
        document.getElementById('bubble1'), 
        document.getElementById('bubble2'), 
        document.getElementById('bubble3'), 
        document.getElementById('bubble4'), 
        document.getElementById('bubble5')
      ];

      let index = 0;
      function typeNext() {
        if (index < texts.length) {
          bubbles[index].style.opacity = 1;
          typeWriter(bubbles[index], texts[index], 50, () => {
            index++;
            setTimeout(typeNext, 900);
          });
        } else {
          setTimeout(() => document.getElementById('continueText4').style.display = 'block', 800);
        }
      }
      typeNext();
    }

    document.getElementById('continueText4').addEventListener('click', lanjutKeScreen5);

    function lanjutKeScreen5() {
      document.getElementById('screen4').classList.remove('active');
      document.getElementById('screen5').classList.add('active');

      const pesan5 = `Oiya sayang, semoga di usia yang baru ini adek menjadi istri yang sholehah,\ntambah sayang sama Mas,\ndan semoga kita cepet bersama - sama \n\nAamiin ya Rabbal 'alamin ❤️\n\nMas sayang banget sama adek.`;
      
      const content5 = document.getElementById('screen5Content');
      
      typeWriter(content5, pesan5, 40, () => {
        setTimeout(() => {
          document.getElementById('continueText5').style.display = 'block';
        }, 800);
      });
    }

    document.getElementById('continueText5').addEventListener('click', lanjutKeScreen6);

    function lanjutKeScreen6() {
      document.getElementById('screen5').classList.remove('active');
      document.getElementById('screen6').classList.add('active');
    }

    function balasWhatsApp() {
  const phone = "6285642571263"; 
  const text = "Makasih banyak Mas untuk ucapannya yang manis 💕 Adek sayang banget sama Mas. Semoga kita selalu bersama ya ❤️";
  const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
  
  window.open(waUrl, '_blank');
}

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
