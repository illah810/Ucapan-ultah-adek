<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Ulang Tahun Sayang! 🎉💕</title>
  <style>
    :root {
      --primary-pink: #ff6b6b;
      --primary-blue: #007bff;
    }

    body {
      margin: 0; padding: 0;
      height: 100vh;
      background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a1c4fd, #ffd1ff);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow: hidden;
      text-align: center;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .screen {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
      box-sizing: border-box;
      z-index: 10;
    }

    .active { display: flex !important; }

    /* REFERENSI TOMBOL LANJUT MODERN */
    .btn-lanjut {
      padding: 15px 50px;
      font-size: 1.2rem;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.4s ease;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
      margin-top: 20px;
    }

    .btn-lanjut:hover {
      background: white;
      color: var(--primary-pink);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    input {
      padding: 15px 20px;
      font-size: 1.2rem;
      width: 80%;
      max-width: 300px;
      text-align: center;
      border: none;
      border-radius: 50px;
      margin: 20px 0;
      background: rgba(255, 255, 255, 0.9);
      outline: none;
      color: #333;
    }

    .bubble {
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 15px 20px;
      margin: 10px auto;
      max-width: 90%;
      border-radius: 20px;
      border-bottom-left-radius: 5px;
      opacity: 0;
      text-align: left;
      position: relative;
      z-index: 20;
    }

    /* EFEK BALON */
    .balloon {
      position: absolute;
      bottom: -150px;
      width: 50px;
      height: 70px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      z-index: 5;
      animation: floatUp 8s ease-in forwards;
    }
    .balloon:before {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 22px;
      border-left: 3px solid transparent;
      border-right: 3px solid transparent;
      border-bottom: 10px solid inherit;
    }
    .balloon:after {
      content: "";
      position: absolute;
      bottom: -40px;
      left: 24px;
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.5);
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
    }

    /* Styles Alert (Sama Seperti Sebelumnya) */
    #customAlert {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;
    }
    .alert-content {
      background: white; padding: 30px; border-radius: 30px; width: 80%; max-width: 320px;
      color: #333; text-align: center;
    }
    .success-icon { font-size: 50px; color: #28a745; margin-bottom: 10px; }
    .btn-blue { background: var(--primary-blue); color: white; width: 100%; margin-top: 20px; padding: 12px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }

    .heart-float { position: absolute; pointer-events: none; animation: floatHeart 4s ease-out forwards; z-index: 999; }
    @keyframes floatHeart {
      0% { transform: translateY(0) scale(0); opacity: 1; }
      100% { transform: translateY(-100vh) scale(2); opacity: 0; }
    }
  </style>
</head>
<body>

  <audio id="backsound" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div class="screen active" id="screen1">
    <h1>Hallo Cantik... ❤️</h1>
    <p>Boleh tau siapa nama kamu?</p>
    <input type="text" id="namaInput" placeholder="Ketik nama kamu di sini..." autocomplete="off">
    <button class="btn-lanjut" onclick="mulai()">Lanjut ❤️</button>
  </div>

  <div class="screen" id="screen2" onclick="keScreen3()">
    <h1>Hai, <span class="namaTampil"></span>! 💕</h1>
    <p>Mas ada sesuatu spesial buat kamu...</p>
    <div style="margin-top:20px; opacity:0.7; cursor:pointer;">Klik di mana saja ya sayang</div>
  </div>

  <div class="screen" id="screen3">
    <h1>Klik 3 LOVE di bawah ini</h1>
    <div style="font-size: 3.5rem; display: flex; gap: 20px; margin: 30px 0;">
      <span class="love" style="cursor:pointer;" onclick="handleLove(this)">🤍</span>
      <span class="love" style="cursor:pointer;" onclick="handleLove(this)">🤍</span>
      <span class="love" style="cursor:pointer;" onclick="handleLove(this)">🤍</span>
    </div>
  </div>

  <div class="screen" id="screen4">
    <div id="bubblesContainer">
      <div class="bubble" id="b1"></div>
      <div class="bubble" id="b2"></div>
      <div class="bubble" id="b3"></div>
      <div class="bubble" id="b4"></div>
      <div class="bubble" id="b5"></div>
    </div>
    <button class="btn-lanjut" id="btnNext4" style="display:none;" onclick="keScreen5()">Klik untuk lanjut ❤️</button>
  </div>

  <div class="screen" id="screen5">
    <div id="pesanAkhir" style="font-size: 1.2rem; padding: 20px; line-height: 1.6; white-space: pre-line;"></div>
    <button class="btn-lanjut" id="btnNext5" style="display:none;" onclick="keScreen6()">Ada satu lagi...</button>
  </div>

  <div class="screen" id="screen6">
    <h1 id="levelUpText"></h1>
    <button class="btn-lanjut" id="btnBalas" style="display:none;" onclick="showMyAlert()">balas</button>
  </div>

  <div id="customAlert">
    <div class="alert-content">
      <div class="success-icon">✔</div>
      <div style="font-size: 1.5rem; font-weight: bold; margin-bottom: 10px;">OK!</div>
      <div style="font-size: 1rem; color: #666;">kirim jawabannya ke WhatsApp Mas ya 😊</div>
      <button class="btn-blue" onclick="finalWA()">Kirim Sekarang</button>
    </div>
  </div>

  <script>
    const backsound = document.getElementById('backsound');
    let loveCount = 0;
    let balloonInterval;

    function mulai() {
      const nama = document.getElementById('namaInput').value.trim();
      if (nama === "") { alert("Isi namanya dulu ya 😊"); return; }
      document.querySelectorAll('.namaTampil').forEach(el => el.innerText = nama);
      backsound.play().catch(() => {});
      pindah('screen1', 'screen2');
    }

    function keScreen3() { pindah('screen2', 'screen3'); }

    function handleLove(el) {
      if (el.innerText === '❤️') return;
      el.innerText = '❤️';
      loveCount++;
      for(let i=0; i<15; i++) { setTimeout(createHeart, i * 50); }
      if (loveCount === 3) setTimeout(() => { pindah('screen3', 'screen4'); jalankanPesan(); }, 800);
    }

    function jalankanPesan() {
      startBalloons(); // Mulai efek balon di screen 4
      const pesans = ["Barakallahu fii umrik, sayangku 💕", "SELAMAT ULANG TAHUN!", "Semoga Mas selalu bisa jadi alasan senyummu,", "Semoga Allah berikan kesehatan, rezeki melimpah,", "dan kebahagiaan yang tiada akhir. Aamiin."];
      let i = 0;
      function show() {
        if (i < pesans.length) {
          const b = document.getElementById(`b${i+1}`); b.style.opacity = "1";
          typeWriter(b, pesans[i], 50, () => { i++; setTimeout(show, 800); });
        } else { document.getElementById('btnNext4').style.display = "block"; }
      }
      show();
    }

    function keScreen5() {
      pindah('screen4', 'screen5');
      const text5 = "Oiya sayang, semoga di usia yang baru ini adek menjadi istri yang sholehah, makin sayang sama Mas dan semoga kita cepat bersama - sama,\n\nAamiin ya Rabbal 'alamin,\nMas sayang banget Adek ❤️";
      typeWriter(document.getElementById('pesanAkhir'), text5, 40, () => {
        document.getElementById('btnNext5').style.display = "block";
      });
    }

    function keScreen6() {
      stopBalloons(); // Berhenti saat masuk screen 6 agar tidak terlalu ramai
      pindah('screen5', 'screen6');
      typeWriter(document.getElementById('levelUpText'), "Happy Level Up Day 🥳🎺", 70, () => {
        setTimeout(() => { document.getElementById('btnBalas').style.display = "block"; }, 500);
      });
    }

    // FUNGSI BALON
    function createBalloon() {
      const b = document.createElement("div");
      b.className = "balloon";
      const colors = ['#ff6b6b', '#ffd93d', '#6bc1ff', '#9d6bff', '#6bff9d'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      b.style.background = color;
      b.style.left = Math.random() * 100 + "vw";
      b.style.animationDuration = (Math.random() * 3 + 5) + "s";
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 8000);
    }

    function startBalloons() {
      balloonInterval = setInterval(createBalloon, 600);
    }

    function stopBalloons() {
      clearInterval(balloonInterval);
    }

    // Helper Functions
    function showMyAlert() { document.getElementById('customAlert').style.display = 'flex'; }
    function finalWA() {
      const nama = document.getElementById('namaInput').value;
      const nomor = "6285642571263";
      const pesan = `Makasih banyak ya Mas buat ucapannya! Adek sayang banget sama Mas ❤️`;
      window.open(`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`);
    }
    function pindah(f, t) { document.getElementById(f).classList.remove('active'); document.getElementById(t).classList.add('active'); }
    function typeWriter(el, txt, spd, cb) {
      let j = 0; el.innerHTML = "";
      function t() { if (j < txt.length) { el.innerHTML += txt.charAt(j); j++; setTimeout(t, spd); } else if (cb) cb(); }
      t();
    }
    function createHeart() {
      const h = document.createElement("div"); h.className = "heart-float"; h.innerText = "❤️";
      h.style.left = Math.random() * 100 + "vw"; h.style.bottom = "0";
      h.style.fontSize = (Math.random() * 30 + 30) + "px"; document.body.appendChild(h);
      setTimeout(() => h.remove(), 4000);
    }
  </script>
</body>
</html>
